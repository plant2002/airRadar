<!DOCTYPE html>
<html lang="sl">
    <head>
        <title>airRadar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial_scale = 1">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
        <script src="scripta.js"></script>
    </head>
    <body>
        <div class = "header">
            <h1>airRadar</h1>
            <p>final project for university</p>
        </div>
        <div class="main">
            <div class="map" id="map">
                <!--map + python created lines-->
                <script>
                    var map = L.map('map').setView([64, 15], 15);
                    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                    }).addTo(map);
                </script>

            </div>
            <div class="right-panel">
                <div class="mode-buttons">
                    <button> PO ŽELJI</button>
                    <button> TEDEN</button>
                    <button> MESEC</button>
                </div>
                <div class="extra-controls control-box hidden" id="custom-controls">
                    <h3>Izberi časovno obdobje</h3>
                    <label for="custom-date"> Datum</label>
                    <input type="date" id="custom-date">

                    <label for="custom-days"> Število dni</label>
                    <input type="number" id="custom-days" min="1" max="31" value="1">

                    <label for="custom-hours">Število ur</label>
                    <input type="number" id="custom-hours" min="1" max="24" value="1">

                    <button id="send-custom">Potrdi</button>
                </div>
                 <div class="extra-controls control-box hidden" id="week-controls">
                    <h3>Izberi teden</h3>
                    <button class="week-btn" data-range="1-7">1. do 7.</button>
                    <button class="week-btn" data-range="8-14">8. do 14.</button>
                    <button class="week-btn" data-range="15-21">15. do 21.</button>
                    <button class="week-btn" data-range="22-28">22. do 28.</button>
                    <button class="week-btn" data-range="29-31">29. do 31.</button>
                </div>
                <div class="timeline">
                    <div class="timeline-top">
                        <button id="play-pause">Pause</button>
                        <span id="timeline-value">Trenutni časovni korak: 0</span>
                    </div>

                    <input type="range" id="timeline-slider" min="0" max="100" value="0">

                    <div class="timeline-labels">
                        <span>Začetek</span>
                        <span>Ura / Dan / Teden</span>
                        <span>Konec</span>
                    </div>

                    <div class="status" id="status">Nisi še izbral podatkov</div>
                </div>
            </div>
        </div>
        
    </body>
    <footer>

    </footer>
</html>
