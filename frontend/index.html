<script>

L.tileLayer('https://stamen-tiles.a.ssl.fastly.net/toner/{z}/{x}/{y}.png', {
    attribution: 'Map tiles by Stamen Design, &copy; OpenStreetMap contributors',
    subdomains: 'abcd',
    minZoom: 0,
    maxZoom: 20
}).addTo(map);

L.circle([46.0569, 14.5058], {
    color: 'blue',
    fillColor: 'blue',
    fillOpacity: 0.1,
    radius: 100000
}).addTo(map);
</script>
